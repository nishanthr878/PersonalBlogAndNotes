<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#1B2A2F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1040" cy="120" r="180" fill="url(#accent)" opacity="0.22" filter="url(#soft)"/>
  <circle cx="220" cy="520" r="220" fill="url(#accent)" opacity="0.16" filter="url(#soft)"/>

  <rect x="72" y="84" width="1056" height="462" rx="28" fill="#0B1220" opacity="0.55" stroke="#2A3A44"/>

  <text x="120" y="270" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="86" font-weight="700" fill="#E6F1FF">
    Nishanth
  </text>

  <text x="120" y="340" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#B7C6D6">
    Personal tech blog, LeetCode logs, and projects.
  </text>

  <path d="M120 392h320" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <text x="120" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="20" fill="#9FB0C0" opacity="0.95">
    personalblogandnotes.pages.dev
  </text>
</svg>
